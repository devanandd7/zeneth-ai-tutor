
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI Studio - Professional Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000000;
            color: #f8fafc;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        ::selection {
            background: rgba(99, 102, 241, 0.4);
            color: #fff;
        }
        
        /* Premium Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .glass-panel {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(2, 6, 23, 0.8));
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Ambient Glow */
        .ambient-glow {
            position: fixed;
            width: 70vw;
            height: 70vh;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
        }

        @keyframes drawIn {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-content {
            animation: drawIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Sleek Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── Markdown / Prose styles ─────────────────── */
        .narrative-markdown p { margin: 0 0 0.4em; }
        .narrative-markdown strong { color: #a5b4fc; font-weight: 800; }
        .narrative-markdown em { color: #67e8f9; font-style: italic; }
        .narrative-markdown code { background: rgba(99,102,241,0.15); color: #a5b4fc; padding: 2px 6px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }
        .narrative-markdown h1, .narrative-markdown h2, .narrative-markdown h3 { color: #fff; font-weight: 800; margin: 0.3em 0; }

        /* prose-invert compat for VisualizationRenderer markdown view */
        .prose-invert { color: #cbd5e1; }
        .prose-invert h1,.prose-invert h2,.prose-invert h3 { color:#f1f5f9; font-weight:800; margin:0.5em 0 0.25em; }
        .prose-invert p { margin: 0.4em 0; line-height:1.7; }
        .prose-invert code { background:rgba(99,102,241,0.15); color:#a5b4fc; padding:2px 8px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:0.85em; }
        .prose-invert ul { list-style: disc; padding-left: 1.4em; }
        .prose-invert ol { list-style: decimal; padding-left: 1.4em; }
        .prose-invert li { margin: 0.25em 0; }
        .prose-invert strong { color:#a5b4fc; font-weight:800; }
        .prose-invert em { color:#67e8f9; }
        .prose-invert blockquote { border-left:3px solid #6366f1; padding-left:1em; color:#94a3b8; margin:0.5em 0; }
        .prose-max-none { max-width: none; }

        /* KaTeX display mode centering */
        .katex-block .katex-display { margin: 0; }
        .katex-block .katex { font-size: 2rem; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="ambient-glow"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
